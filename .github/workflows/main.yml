name: CI/CD - Agente RAG - Azure for Students fallback

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  IMAGE_REPOSITORY: ${{ secrets.IMAGE_REPOSITORY }}
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install and test
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m pytest -q

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}:latest

  deploy:
    needs: build-push
    runs-on: [self-hosted, windows, x64, azure-student]

    steps:
      - uses: actions/checkout@v4

      - name: Verify interactive Azure session
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          az account show --output table
          az extension add --name containerapp --upgrade

      - name: Update Container App
        shell: powershell
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          SQL_CONNECTION: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: |
          $ErrorActionPreference = "Stop"

          az containerapp registry set `
            --name "$env:CONTAINER_APP_NAME" `
            --resource-group "$env:RESOURCE_GROUP" `
            --server "$env:ACR_LOGIN_SERVER" `
            --username "$env:ACR_USERNAME" `
            --password "$env:ACR_PASSWORD"

          az containerapp secret set `
            --name "$env:CONTAINER_APP_NAME" `
            --resource-group "$env:RESOURCE_GROUP" `
            --secrets `
              "azure-sql-connection-string=$env:SQL_CONNECTION"

          $fullImage = `
            "$env:ACR_LOGIN_SERVER/$env:IMAGE_REPOSITORY`:$env:IMAGE_TAG"

          az containerapp update `
            --name "$env:CONTAINER_APP_NAME" `
            --resource-group "$env:RESOURCE_GROUP" `
            --image "$fullImage" `
            --set-env-vars `
              APP_ENV=azure `
              LLM_PROVIDER=demo `
              TOP_K=3 `
              AZURE_SQL_CONNECTION_STRING=secretref:azure-sql-connection-string

      - name: Validate deployment
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $fqdn = az containerapp show `
            --name "$env:CONTAINER_APP_NAME" `
            --resource-group "$env:RESOURCE_GROUP" `
            --query properties.configuration.ingress.fqdn `
            --output tsv

          $ok = $false
          for ($i = 1; $i -le 18; $i++) {
            try {
              Invoke-RestMethod -Uri "https://$fqdn/health"
              $ok = $true
              break
            }
            catch {
              Start-Sleep -Seconds 10
            }
          }

          if (-not $ok) {
            throw "La Container App no respondió en /health"
          }

          Invoke-RestMethod -Uri "https://$fqdn/knowledge"
